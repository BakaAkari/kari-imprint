[DEFAULT]
host = localhost
port = 15050
debug = False
input_folder = ./input
output_folder = {source_dir}/output
override_existed = True
supported_file_suffixes = .jpeg,.jpg,.png,.heic
quality = 60
subsampling = 2
author_name = 
author_font = ZhiMangXing-Regular.ttf
logo_path = 
signature_enabled = False
signature_path = 
signature_color = white

[render]
template_name = 文件夹名+右下角参数


[performance]
# 并行批处理 worker 数：
#   -1 = 自动（cpu_count - 1）
#    0 = 串行（不使用 ProcessPool，便于调试）
#   >0 = 显式上限
max_workers = -1
# 是否在输出图旁同时写出 *.exif.json sidecar 文件
emit_exif_json = False


[custom_text]
left_top = 
left_bottom = 
right_top = 
right_bottom = 
text = 
