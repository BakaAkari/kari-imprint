# AKA Semi-Utils Web - Nginx 配置
# 放置于 /etc/nginx/conf.d/semi-utils.conf

server {
    listen 80;
    server_name photo.baka-akari.icu;

    # 前端静态文件 /semi-utils/
    location /semi-utils/ {
        alias /var/www/personal-home/semi-utils/;
        try_files $uri $uri/ /semi-utils/index.html;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:2189;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 上传大小限制
        client_max_body_size 50M;
        # 超时设置
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # 根路径重定向到前端
    location = / {
        return 301 /semi-utils/;
    }

    # 健康检查
    location /health {
        proxy_pass http://127.0.0.1:2189/api/health;
        access_log off;
    }
}
