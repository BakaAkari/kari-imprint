[server]
api_prefix = "/tools/watermark-v3/api"

[paths]
data_dir = ""
assets_dir = ""

[upload]
max_file_bytes = 104857600
max_image_pixels = 150000000
allowed_extensions = ["jpg", "jpeg", "png", "webp", "heic", "heif", "tif", "tiff"]

[preview]
max_edge = 1600
device_pixel_ratio_limit = 2.0
jpeg_quality = 82

[process]
max_pixels = 120000000
concurrency = 1

[output]
quality = 95

[resource]
max_file_bytes = 5242880
max_pixels = 25000000

[storage]
file_ttl_seconds = 3600
