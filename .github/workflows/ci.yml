name: Web CI

on:
  push:
    branches: [main, feat/web-mvp]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl
      - run: uv python install 3.13
      - run: uv sync --frozen --all-packages --all-groups
      - run: uv run --all-packages --all-groups ruff check .
      - run: uv run --all-packages --all-groups pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run test:presets
      - run: npx tsc -b --pretty false
      - run: VITE_API_BASE=/tools/watermark-v3 npm run build
