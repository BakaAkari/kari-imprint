<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>水印工具｜回炉重塑中</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #121210;
      --text: #d0ccc4;
      --dim: #8f887b;
      --faint: #5e594f;
      --line: #2a2721;
      --accent: #8a7a5c;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Microsoft YaHei", "微软雅黑", system-ui, sans-serif;
      letter-spacing: .02em;
    }
    main {
      width: min(680px, calc(100vw - 48px));
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 44px 48px;
      background: #151410;
    }
    .eyebrow {
      margin: 0 0 18px;
      color: var(--accent);
      font: 700 12px/1.2 "JetBrains Mono", ui-monospace, monospace;
      letter-spacing: .18em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 56px);
      line-height: 1.05;
      font-weight: 800;
    }
    p {
      margin: 18px 0 0;
      max-width: 34em;
      color: var(--dim);
      font-size: 15px;
      line-height: 1.8;
    }
    a {
      display: inline-flex;
      margin-top: 28px;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
      padding-bottom: 4px;
      font-size: 13px;
    }
    .meta {
      margin-top: 34px;
      color: var(--faint);
      font: 12px/1.4 "JetBrains Mono", ui-monospace, monospace;
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">WATERMARK TOOL</div>
    <h1>回炉重塑中</h1>
    <p>旧版水印工具已下线。新的 V3 版本正在重构排版引擎、渲染一致性和工作台体验。</p>
    <a href="/tools/">返回工具索引</a>
    <div class="meta">baka-akari.zone / tools / watermark</div>
  </main>
</body>
</html>
